[build]
  base    = "frontend"
  command = "next build"
  publish = ".next"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Next.js middleware handles routing, no need for Netlify redirects
# [[redirects]]
#   from = "/app"
#   to = "/app/"
#   status = 301
#
# [[redirects]]
#   from = "/admin"
#   to = "/app/admin"
#   status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: blob: https:; font-src 'self' data: https:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; connect-src 'self' https: wss:;"
